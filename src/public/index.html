<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS CeNAT - Centro Nacional de Alta Tecnología</title>

    <!-- Tailwind CSS CDN con soporte para dark mode -->
    <script>
        // Aplicar dark mode ANTES de que Tailwind cargue para evitar flash
        if (localStorage.getItem('darkMode') === 'true' ||
            (localStorage.getItem('darkMode') === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="/css/styles.css">

    <!-- Tailwind config con dark mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'cenat-blue': '#1e3a8a',
                        'cenat-light': '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-slate-900 min-h-screen transition-colors duration-300">

    <!-- Navbar -->
    <nav id="navbar" class="bg-white dark:bg-slate-800 shadow-md hidden transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="#/" class="flex items-center space-x-2">
                        <i class="fas fa-graduation-cap text-cenat-blue text-2xl"></i>
                        <span class="font-bold text-xl text-cenat-blue">LMS CeNAT</span>
                    </a>
                </div>

                <!-- Menu Desktop -->
                <div class="hidden md:flex items-center space-x-6">
                    <a href="#/"
                        class="text-gray-700 dark:text-slate-300 hover:text-cenat-blue dark:hover:text-blue-400 transition">
                        <i class="fas fa-home mr-1"></i> Inicio
                    </a>
                    <a href="#/my-courses" id="my-courses-link"
                        class="text-gray-700 dark:text-slate-300 hover:text-cenat-blue dark:hover:text-blue-400 transition">
                        <i class="fas fa-book mr-1"></i> Mis Cursos
                    </a>
                    <a href="#/admin" id="admin-link"
                        class="text-gray-700 dark:text-slate-300 hover:text-cenat-blue dark:hover:text-blue-400 transition"
                        style="display:none;">
                        <i class="fas fa-cog mr-1"></i> Administración
                    </a>

                    <!-- Dark mode toggle -->
                    <button id="dark-mode-toggle" onclick="toggleDarkMode()" title="Cambiar modo oscuro/claro">
                        <i class="fas fa-moon text-gray-600 dark:text-yellow-400"></i>
                    </button>

                    <!-- User Menu -->
                    <div class="relative">
                        <button id="user-menu-button"
                            class="flex items-center space-x-2 text-gray-700 dark:text-slate-300 hover:text-cenat-blue transition">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span id="user-name">Usuario</span>
                            <i class="fas fa-chevron-down text-sm"></i>
                        </button>

                        <!-- Dropdown -->
                        <div id="user-dropdown"
                            class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-md shadow-lg py-1 z-50 border border-gray-100 dark:border-slate-700">
                            <a href="#/profile"
                                class="block px-4 py-2 text-sm text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700">
                                <i class="fas fa-user mr-2"></i> Mi Perfil
                            </a>
                            <button id="logout-btn"
                                class="w-full text-left block px-4 py-2 text-sm text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700">
                                <i class="fas fa-sign-out-alt mr-2"></i> Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center gap-3">
                    <button id="dark-mode-toggle-mobile" onclick="toggleDarkMode()"
                        class="text-gray-600 dark:text-yellow-400">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="mobile-menu-btn" class="text-gray-700 dark:text-slate-300 hover:text-cenat-blue">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden pb-4 dark:bg-slate-800">
                <a href="#/" class="block py-2 text-gray-700 dark:text-slate-300 hover:text-cenat-blue transition">
                    <i class="fas fa-home mr-1"></i> Inicio
                </a>
                <a href="#/my-courses" id="my-courses-link-mobile"
                    class="block py-2 text-gray-700 dark:text-slate-300 hover:text-cenat-blue transition">
                    <i class="fas fa-book mr-1"></i> Mis Cursos
                </a>
                <a href="#/admin" id="admin-link-mobile"
                    class="block py-2 text-gray-700 dark:text-slate-300 hover:text-cenat-blue transition"
                    style="display:none;">
                    <i class="fas fa-cog mr-1"></i> Administración
                </a>
                <a href="#/profile"
                    class="block py-2 text-gray-700 dark:text-slate-300 hover:text-cenat-blue transition">
                    <i class="fas fa-user mr-1"></i> Mi Perfil
                </a>
                <button id="logout-btn-mobile"
                    class="w-full text-left block py-2 text-gray-700 dark:text-slate-300 hover:text-cenat-blue transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app" class="min-h-screen">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <i class="fas fa-spinner fa-spin text-4xl text-cenat-blue"></i>
                <p class="mt-4 text-gray-600 dark:text-slate-400">Cargando...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer
        class="bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 mt-auto transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="text-center text-gray-600 dark:text-slate-400 text-sm">
                <p>&copy; 2024 Centro Nacional de Alta Tecnología (CeNAT)</p>
                <p class="mt-1">Desarrollado por Mauricio Hidalgo Garzón - TCU UFIDE</p>
            </div>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 max-w-sm">
        <div class="bg-white dark:bg-slate-800 rounded-lg shadow-lg p-4 flex items-center space-x-3">
            <i id="toast-icon" class="text-2xl"></i>
            <div class="flex-1">
                <p id="toast-message" class="text-sm font-medium text-gray-900 dark:text-slate-200"></p>
            </div>
            <button onclick="hideToast()"
                class="text-gray-400 hover:text-gray-600 dark:text-slate-500 dark:hover:text-slate-300">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/darkmode.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/views_auth.js"></script>
    <script src="/js/views_home.js"></script>
    <script src="/js/views_course_detail.js"></script>
    <script src="/js/views_my_courses.js"></script>
    <script src="/js/views_admin_dashboard.js"></script>
    <script src="/js/views_admin_courses.js"></script>
    <script src="/js/views_admin_create_course.js"></script>
    <script src="/js/views_admin_edit_course.js"></script>
    <script src="/js/views_admin_users.js"></script>
    <script src="/js/views_profile.js"></script>
    <script src="/js/app.js"></script>

    <script>
        initDarkMode();
    </script>
</body>

</html>
